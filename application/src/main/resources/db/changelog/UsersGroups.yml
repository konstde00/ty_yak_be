databaseChangeLog:
  -  preConditions:

  -  changeSet:
       id:  createUsersGroupsTable
       author:  konstde00
       changes:
         -  createTable:
              columns:
                - column:
                    name: id
                    type: bigint
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: group_id
                    type: bigint
                    constraints:
                      nullable: false
                - column:
                    name: user_id
                    type: bigint
                    constraints:
                      nullable: false
                - column:
                    name: created_at
                    type: timestamp
              tableName: users_groups
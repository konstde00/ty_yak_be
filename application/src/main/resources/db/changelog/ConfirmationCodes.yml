databaseChangeLog:
  -  preConditions:

  -  changeSet:
       id:  createUsersCodesTable
       author:  konstde00
       changes:
         -  createTable:
              columns:
                - column:
                    name: id
                    type: bigint
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: user_id
                    type: bigint
                    constraints:
                      nullable: false
                - column:
                    name: code
                    type: int
                    constraints:
                      nullable: false
                - column:
                    name: created_at
                    type: timestamp
                - column:
                    name: expired_at
                    type: timestamp
              tableName: confirmation_codes
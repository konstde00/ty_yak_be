databaseChangeLog:
  -  preConditions:

  -  changeSet:
       id:  createUsersInvitationsTable
       author:  konstde00
       changes:
         -  createTable:
              columns:
                - column:
                    name: id
                    type: bigint
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: user_id
                    type: bigint
                    constraints:
                      nullable: false
                - column:
                    name: link
                    type: varchar
                    constraints:
                      nullable: false
                - column:
                    name: created_at
                    type: timestamp
                - column:
                    name: registrations
                    type: numeric
              tableName: users_invitations
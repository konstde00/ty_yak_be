databaseChangeLog:
  -  preConditions:

  -  changeSet:
       id:  createUserRolesTable
       author:  konstde00
       changes:
         -  createTable:
              columns:
                - column:
                    name: id
                    type: bigint
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: user_id
                    type: bigint
                    constraints:
                      nullable: false
                - column:
                    name: role
                    type: varchar
                    constraints:
                      nullable: false
              tableName: roles